services:
  backend:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    image: pc-shop-backend:latest
    container_name: pc-shop-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://your_username:your_password@localhost:5432/pc_shop_database}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here_change_in_production}
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-*}"
      SERVER_PORT: ${SERVER_PORT:-8000}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/images

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    image: pc-shop-frontend:latest
    container_name: pc-shop-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    environment:
      - NODE_ENV=production

volumes:
  backend_uploads:
    driver: local
